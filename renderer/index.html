<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob: data:; connect-src 'self' ws:; style-src 'self' 'unsafe-inline';" />
  <title>LANDesk</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="topbar">
    <div class="brand">
      <span class="dot" id="statusDot"></span>
      <span class="logo">LANDesk</span>
    </div>
    <div id="tabs" class="tabs"></div>
    <div class="topbar-right">
      <div class="quality" id="qualityGroup" hidden>
        <button data-q="low">Low</button>
        <button data-q="med" class="active">Med</button>
        <button data-q="high">High</button>
      </div>
      <button id="fullscreenBtn" class="ghost" hidden>⛶ Fullscreen</button>
      <button id="disconnectBtn" class="danger" hidden>Disconnect</button>
    </div>
  </div>

  <div id="layout">
    <aside id="sidebar">
      <div class="sidebar-head">
        <h2>Devices on this network</h2>
        <span id="hostCount" class="badge">0</span>
      </div>
      <div id="deviceList" class="device-list">
        <div class="searching-hint" id="emptyHint">
          <div class="search-spinner"></div>
          <span>Looking for other PCs…</span>
          <small>Open LANDesk on another PC and it appears here.</small>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="self-card">
          <div class="self-dot"></div>
          <div class="self-text">
            <div class="self-label">This PC</div>
            <div id="selfInfo" class="self-info">…</div>
          </div>
        </div>
        <div class="self-hint">Others can connect to this PC with one click.</div>
      </div>
    </aside>

    <main id="main">
      <div id="placeholder" class="placeholder">
        <div class="ph-icon">
          <svg viewBox="0 0 80 68" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="76" height="50" rx="5" stroke="currentColor" stroke-width="2.5"/>
            <rect x="9" y="9" width="62" height="36" rx="2" fill="currentColor" opacity="0.07"/>
            <path d="M30 52 L28 62" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M50 52 L52 62" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="22" y1="62" x2="58" y2="62" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="18" y1="24" x2="62" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
            <line x1="18" y1="32" x2="46" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.14"/>
          </svg>
        </div>
        <p>Select a device from the left to start a live session.</p>
        <p class="muted">All traffic stays on your local network.</p>
      </div>
      <div id="stage" class="stage" hidden>
        <canvas id="screen" tabindex="0"></canvas>
        <div id="statsOverlay" class="stats"></div>
        <div id="streamMsg" class="stream-msg" hidden>
          <div class="stream-spinner"></div>
          <div class="stream-msg-text">Connecting…</div>
          <div class="stream-msg-sub"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="streamView.js"></script>
  <script src="inputCapture.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
